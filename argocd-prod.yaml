apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-prod
  namespace: argocd
spec:
  source:
    repoURL: 'https://github.com/VincentMssx/argocd.git'
    path: deploy
    helm:
      valueFiles:
        - values-prod.yaml # <--- IMPORTANT
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod-env
  syncPolicy:
    automated: { prune: true, selfHeal: true }