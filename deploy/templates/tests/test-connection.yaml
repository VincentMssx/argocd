apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "my-react-app.fullname" . }}-test-connection"
  labels:
    {{- include "my-react-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test # <--- Dit à Helm/Argo que c'est un test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "my-react-app.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never