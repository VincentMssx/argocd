{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "my-react-app.serviceAccountName" . }}
  labels:
    {{- include "my-react-app.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.annotations }} # Vérifie avant d'accéder
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount | default true }}
{{- end }}²