apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-dev # (et app-prod pour l'autre)
  namespace: argocd
spec:
  project: default    # <--- AJOUTEZ CETTE LIGNE ICI
  source:
    repoURL: 'https://github.com/VincentMssx/argocd.git'
    path: deploy
    targetRevision: HEAD
    helm:
      valueFiles:
        - values-dev.yaml # (ou values-prod.yaml)
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev-env   # (ou prod-env)
  syncPolicy:
    automated:
      prune: true
      selfHeal: true